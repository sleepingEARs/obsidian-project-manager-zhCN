name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New plugin version (e.g. 2.0.0-beta)'
        required: true
        type: string
      min_app_version:
        description: 'Obsidian minAppVersion (leave empty to keep current)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "must be dispatched from main (got $GITHUB_REF)" >&2
            exit 1
          fi
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "version '$VERSION' is not valid semver" >&2
            exit 1
          fi
          git fetch --tags origin
          if git show-ref --tags --verify --quiet "refs/tags/$VERSION"; then
            echo "tag $VERSION already exists" >&2
            exit 1
          fi

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: package.json

      - name: Bump manifest.json, versions.json, package.json
        env:
          VERSION: ${{ inputs.version }}
          MIN_APP_VERSION: ${{ inputs.min_app_version }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const version = process.env.VERSION;
          const inputMin = process.env.MIN_APP_VERSION;

          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const minAppVersion = inputMin || manifest.minAppVersion;
          manifest.version = version;
          manifest.minAppVersion = minAppVersion;
          fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');

          const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
          versions[version] = minAppVersion;
          fs.writeFileSync('versions.json', JSON.stringify(versions, null, 2) + '\n');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = version;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          EOF

      - name: Commit, tag, and push
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json versions.json package.json
          git commit -m "bump version to $VERSION"
          git tag "$VERSION"
          git push --atomic origin HEAD:main "refs/tags/$VERSION"

  release:
    needs: bump
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ inputs.version }}
